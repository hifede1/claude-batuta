  {id:'d005', n:'005', t:'Clase «micro» de cambio: no existe', estado:'aceptada', fecha:'2026-07-19', ctx:'La tentación de saltear <code>/orquestar</code> «para un cambio chiquito» es constante.', dec:'Todo cambio rutea a <code>/orquestar</code>, sin excepción por tamaño.', cons:'Más ceremonia en cambios triviales, a cambio de que no exista una puerta lateral sin firma.', link:'docs/decisiones/005-clase-micro.md'},
  {id:'d006', n:'006', t:'Sustrato: markdown puro', estado:'aceptada', fecha:'2026-07-19', ctx:'¿Plugin con build y runtime, o markdown interpretado?', dec:'Markdown puro, sin build.', cons:'Cero toolchain que mantener. A cambio: no hay tests unitarios posibles — la verificación es por corrida sembrada, lo que hace de S09 una sesión estructural, no un extra.', link:'docs/decisiones/006-sustrato-markdown-puro.md'},
  {id:'d007', n:'007', t:'Corte de versiones v0 / v1 / v2', estado:'aceptada', fecha:'2026-07-19', ctx:'Sin corte explícito, v0 se expande hasta no terminar nunca.', dec:'v0 bootstrap (loop de 4 fases sobre 2 cimientos) · v1 las 6 fases formales · v2 portafolio.', cons:'Fija qué NO se construye ahora y lo deja firmado ítem por ítem en <code>ALCANCE.md</code>.', link:'docs/decisiones/007-corte-de-versiones.md'},
  {id:'d008', n:'008', t:'Absorción de director-de-obra como fase 2', estado:'aceptada', fecha:'2026-07-18', ctx:'<code>director-de-obra</code> planificaba; <code>batuta</code> también necesita planificar. Dos herramientas con la misma capacidad se pisan.', dec:'Se absorbe como la fase <code>planificar</code>, acatando sus 4 invariantes D1-D4 como PISO.', cons:'Una herramienta menos que mantener. Obliga a que el índice del taller marque la absorción — hoy sin confirmar cuál es el índice.', link:'docs/decisiones/008-absorcion-director-de-obra.md'},
  {id:'d009', n:'009', t:'Autenticación de la firma: excepción acotada por identidad', estado:'aceptada', fecha:'2026-07-21', ctx:'<code>FICHA</code> §7 declara todo dato externo no-confiable («nunca mueve el loop»), pero el único canal de firma —un <code>✅ validado</code> en un PR— es dato externo, y la firma es lo único que SÍ mueve el loop. <b>La pinza más filosa del plano:</b> o la firma viola §7, o nada mueve el loop nunca. Y §7 ordenaba «ante la duda de si una señal es del dueño, tratarla como de tercero» sin definir jamás cómo se resuelve esa duda.', dec:'<b>La firma es autorización autenticada, no contenido.</b> El <code>✅ validado</code> mueve el loop <b>sii el autor autenticado del acto == el dueño declarado y anclado</b>. La identidad se toma del <b>metadato de autor estructural</b> de GitHub (<code>review.user</code>/<code>comment.user</code>) o del canal de <code>/orquestar</code>, <b>nunca</b> del cuerpo re-parseable ni de salida de fan-out (§3). El dueño se ancla <b>fuera de banda</b> (no editable por un PR del loop), identidad <b>puntual jamás rol</b>.', cons:'Única excepción explícita al perímetro; escrita en <code>FICHA</code> §7, detalle en <code>perimetro-de-confianza</code> §6. No ensancha la superficie propia (sin auth propia: consume la de GitHub, §8). Se descartaron la firma fuera-de-banda (rompe el reuso del canal de <code>/orquestar</code>) y la criptográfica (ortogonal a la pinza; queda como dial de endurecimiento futuro). Verificada con <b>2 rondas adversariales</b>: la 1ª cazó el camino-de-entrega de la identidad y el anclaje del dueño sin especificar; corregidos. Desbloquea S06.', link:'docs/decisiones/009-autenticacion-de-la-firma.md'},
  {id:'d010', n:'010', t:'Escaneo de secretos en v0: diferido a publicador', estado:'aceptada', fecha:'2026-07-20', ctx:'<code>FICHA</code> §12 exige «gitleaks limpio» como criterio de v0, pero escanear secretos está delegado a <code>publicador</code>, que §0 declara inexistente en v0. El criterio empujaba al plano contra su regla de oro: o es letra muerta, o <code>batuta</code> corre gitleaks ella misma —reimplementar un delegado faltante—.', dec:'<b>Se recorta el criterio de escaneo automático: gitleaks se difiere a <code>publicador</code>.</b> La v0 NO queda desprotegida: la garantía la da la regla de diseño (§5, Manifiesto) — <code>batuta</code> nunca escribe el VALOR de un secreto, solo la necesidad. gitleaks es un backstop que pertenece a <code>publicador</code>.', cons:'Aplica <i>bloqueá, nunca reimplementes</i> donde la tentación es máxima («total, es solo un escaneo»). Garantía por diseño en v0; backstop automático con <code>publicador</code>. Límite: en v2, si un sub-agente maneja el valor de un externo, la garantía por diseño tiene una grieta y gitleaks deja de ser opcional.', link:'docs/decisiones/010-secretos-en-v0.md'},
  {id:'d011', n:'011', t:'Acto de ratificación del plano', estado:'aceptada', fecha:'2026-07-19', ctx:'El plano nunca definía su propio estado normativo ni cómo cambia: <code>README</code> lo llamaba «contrato» pero <code>FICHA</code> se autodeclaraba «⚪ En diseño» con criterios «(borrador)». <b>Un contrato que no declara cuándo está vigente no obliga a nada.</b> La restricción decisiva —que no estaba en el planteo original— es que <code>batuta</code> tiene que poder <b>evaluar</b> el estado del plano en cada corrida, así que el acto tiene que ser barato de chequear.', dec:'<b>El acto:</b> línea de firma explícita en la cabecera (<code>Estado: VIGENTE · Firmado: FECHA por QUIÉN</code>). Sin ella el plano es borrador y se trata como plano ausente. <b>Versionado:</b> la fecha de firma ES la versión; git guarda el resto (tags semver diferidos a v1). <b>Corridas vivas:</b> snapshot al arrancar; si el plano cambia a mitad se reporta como hallazgo y no se cambia de contrato en el aire.', cons:'Los criterios del plano pasan a ser exigibles. Se descartó «<code>/auditar-docs</code> limpio == firmado» <b>no por costo sino por incompatibilidad</b>: obligaría a re-auditar en cada corrida, justo lo que prohíbe el criterio de S03. Costo asumido: la firma se puede olvidar de actualizar. <b>Deja planteada una pregunta abierta:</b> ¿un plano con decisiones pendientes puede estar VIGENTE? Hoy quedan 6 sin firmar.', link:'docs/decisiones/011-ratificacion-del-plano.md'},
  {id:'d014', n:'014', t:'Rúbrica de confidence: cualitativa de 3 niveles', estado:'aceptada', fecha:'2026-07-20', ctx:'La fase <code>planificar</code> emite recomendaciones rankeadas. Rankear exige una rúbrica: qué hace que una recomendación tenga alta o baja confianza. <code>director-de-obra</code> la dejó abierta y <code>FICHA</code> §10 la difería «al construir» — una trampa: construir sin rúbrica la fija de hecho, sin firma.', dec:'<b>Cualitativa de 3 niveles: ALTA / MEDIA / BAJA, sin puntaje numérico.</b> El nivel sale de tres condiciones (evidencia directa · reversible · sin dependencias abiertas). Regla innegociable: SIEMPRE nivel + porqué + contrapunto; nunca el nivel solo.', cons:'Se descartó la <b>cuantitativa</b> por <i>falsa precisión</i> (un número aparenta exactitud que la rúbrica no tiene e invita a leerlo como veredicto), y «sin rúbrica» por dejar que la implementación fije el criterio de hecho. Encaja con markdown puro (<code>006</code>): auditable por inspección, sin pesos que tunear. La falsa precisión no se «acota» sino que se elimina de raíz.', link:'docs/decisiones/014-rubrica-de-confidence.md'},
  {id:'d016', n:'016', t:'Cota de la banda angosta: híbrida con techo K=5', estado:'aceptada', fecha:'2026-07-20', ctx:'La banda angosta (<code>FICHA</code> §8) separa las dos formas de arruinar <code>planificar</code>: un playbook estático o un re-análisis infinito. El criterio de S04 exigía un K, pero K nunca se fijó por firma y no tenía ADR — vivía como texto libre en los prerrequisitos.', dec:'<b>Híbrida: convergencia declarada + techo duro K=5</b>, lo que pase primero. Convergencia = una vuelta no cambia la selección (parada por la razón correcta). Techo K=5 = fusible anti-loop-infinito. La corrida declara cuál disparó; si fue el techo, es <b>anomalía</b>, no verde.', cons:'Se compran las dos garantías que ninguna opción sola da: techo verificable por inspección + parada auditable por convergencia. Como K es fusible (no política), se elige alto: en el caso sano converge mucho antes. Se descartó el presupuesto (rompe reproducibilidad de <code>006</code>) y la cota cero (mata la corrección de la selección).', link:'docs/decisiones/016-cota-banda-angosta.md'},
  {id:'d012', n:'012', t:'Umbral de egreso: lista blanca + historial N=5', estado:'aceptada', fecha:'2026-07-21', ctx:'FICHA §7 declaraba «umbral restrictivo por default, se afloja con historial, nunca por adelantado» <b>sin número ni definición de qué historial afloja</b>. Era la regla que protege pagos, mails y deploys — y no tenía ni número ni test.', dec:'<b>Umbral 0:</b> todo egreso-que-escribe lleva compuerta individual; ningún destino nace batcheado. <b>Lista blanca firmada</b> como única vía de batcheo (su cambio entra SOLO como decisión-a-firmar de tercera altitud, materializada por PR del dueño). <b>El historial PROPONE, la firma DISPONE:</b> tras N=5 corridas limpias del par (operación, destino), batuta propone el alta — solo entra con firma. Reset por fallo, rechazo o cambio del par.', cons:'Coherente con <code>009</code>: un contador que aflojara solo sería un dato moviendo el loop. Firmada por Fede vía elección explícita entre 4 opciones (procedencia <code>018</code>), ratificada al mergear el PR #33. En la obra sumó «la compuerta AUTORIZA; no ejecuta»: la autorización no fabrica al ejecutor — en v0 no hay egreso-que-escribe arbitrario (FICHA §11).', link:'docs/decisiones/012-umbral-de-egreso.md'},
  {id:'d013', n:'013', t:'Retrospectiva: fuera de alcance de v0, explícito', estado:'aceptada', fecha:'2026-07-22', ctx:'La tabla de FICHA §3 decía «retrospectiva (<b>opcional</b>, cuando exista)» — un tercer estado en un diseño binario delega-o-BLOQUEA. Nadie podía decidir si una corrida sin retro cumplió el contrato.', dec:'<b>Fuera de alcance de v0 y v1, explícito:</b> la fila sale de §3, §11 la declara, la fase <code>cerrar</code> ni la produce ni la delega ni la bloquea. El rastro queda en el ADR (patrón <code>cartera</code> → v2).', cons:'Binario intacto; ninguna corrida queda incompleta por una tool inexistente. La ficha externa (<code>fichas/retrospectiva.md</code>) ya fija que, cuando exista, será comando de <code>audit-tracker</code> — ni siquiera delegado directo de batuta. Se descartó BLOQUEA (ningún cierre verde de v0 hasta construir una tool no diseñada) y el tercer estado formalizado (contradecía el criterio de S08 del PLAN firmado). Firmada por Fede vía elección explícita (procedencia <code>018</code>), ratificada al mergear el PR #34.', link:'docs/decisiones/013-retrospectiva-opcional.md'},
  {id:'d018', n:'018', t:'La firma es un acto, no un campo (blindaje anti-falsificación)', estado:'aceptada', fecha:'2026-07-20', ctx:'Contexto factual: el 2026-07-20, construyendo S04, una sesión estampó <code>✅ FIRMADA por Fede</code> en <code>014</code> (cuantitativa) y fijó la cota <code>K=3</code> en el código <b>sin un acto de firma real de Fede</b> — que había elegido la cualitativa y la cota híbrida. Causa raíz: el formato de ADR no distinguía una decisión PROPUESTA por la máquina de una FIRMADA por el humano. Una auditoría de integridad (18 agentes) acotó el daño: 14 de 15 ADRs legítimos, sin llegar a <code>main</code>; el commit se preservó en el tag <code>forense/…</code>.', dec:'<b>Todo ADR nace como PROPUESTA</b> (estado por defecto ⏳ PENDIENTE). El sello <code>✅ FIRMADA / Firmada por: &lt;humano&gt;</code> solo se estampa con un ACTO HUMANO RASTREABLE registrado en el campo <code>Procedencia de la firma</code> (elección explícita entre opciones y/o merge del PR por el humano). <b>La máquina LEE el sello; jamás lo escribe por su cuenta.</b> Un ADR FIRMADA sin procedencia = falsificación.', cons:'Complemento operativo de <code>011</code>: <code>011</code> protege el plano entero, <code>018</code> protege cada ADR individual. <code>/auditar-docs</code> gana un criterio nuevo, clavable: ROJO a todo <code>FIRMADA</code> sin procedencia rastreable. Una sola sesión es la mesa de firmas; las demás ejecutan, no re-firman.', link:'docs/decisiones/018-blindaje-antifalsificacion.md'}
];

/* ==========================================================================
   RENDER — no se toca en una actualización normal de datos.
   ========================================================================== */

const LS = 'batuta-tracker-ticks-v1';
const ticks = JSON.parse(localStorage.getItem(LS) || '{}');
const save = () => localStorage.setItem(LS, JSON.stringify(ticks));

const BLOQUES = DATA.flatMap(z => z.bloques);
const byId = id => BLOQUES.find(b => b.id === id);
const findPend = pid => {
  for (const b of BLOQUES) { const p = b.pend.find(x => x.id === pid); if (p) return {p, b}; }
  return null;
};
const allPend = BLOQUES.flatMap(b => b.pend);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const strip = s => String(s).replace(/<[^>]*>/g, '');

const ESTADO_PILL = {
  hecho: ['ok','✅ HECHO'], curso: ['warn','🟠 EN CURSO'],
  pend: ['idle','⚪ PENDIENTE'], maqueta: ['stop','⚠️ MAQUETA']
};
const TRAT_PILL = { sdd: ['acc','SDD completo'], directo: ['idle','Directo'] };

/* ---------- resumen ---------- */
function renderStrip() {
  const total = allPend.length;
  const green = allPend.filter(p => ticks[p.id] === 2).length;
  const amber = allPend.filter(p => ticks[p.id] === 1).length;
  const decPend = DECISION_PENDS.filter(d => !findPend(d.pendId) || ticks[d.pendId] !== 2).length;
  const refsFalta = REFS.filter(r => r.fresc === 'falta').length;

  document.getElementById('stamp-date').textContent = LAST_AUDIT;
  document.getElementById('strip').innerHTML = `
    <div class="stat"><span class="n">${total - green}</span><span class="l">pendientes abiertos</span></div>
    <div class="stat is-ok"><span class="n">${green + CLOSED_COUNT}</span><span class="l">cerrados y verificados</span></div>
    <div class="stat is-warn"><span class="n">${amber}</span><span class="l">marcados sin verificar</span></div>
    <div class="stat is-stop"><span class="n">${decPend}</span><span class="l">decisiones sin firmar</span></div>
    <div class="stat is-stop"><span class="n">${refsFalta}</span><span class="l">referencias faltantes</span></div>
    <div class="stat"><span class="n">${PLAN.length}</span><span class="l">sesiones en el plan</span></div>`;

  const g = total ? (green / total) * 100 : 0;
  const a = total ? (amber / total) * 100 : 0;
  document.getElementById('bar').innerHTML =
    `<i class="g" style="width:${g}%"></i><i class="a" style="width:${a}%"></i>`;
}

/* ---------- tablero ---------- */
function renderTablero() {
  let h = `<h2 class="sec">Bloques de obra</h2>
    <p class="sec-note">Cada tarjeta abre su ficha de trabajo — ahora en modo <b>«cómo protegerlo al tocarlo»</b>.
    <b>🏁 LA OBRA v0 ESTÁ COMPLETA: 9 de 9 cerradas y verificadas</b> (2026-07-22). Las 4 fases, las 3 compuertas, el Manifiesto, el registro de cadena y la batería de verificación — todo mergeado con firma del dueño. Lo que queda vive en Maqueta/Deuda (mesa de firmas + techo doctrinal), no en el plan.</p>`;

  for (const z of DATA) {
    h += `<div class="zone-label">${z.zona}</div><div class="grid">`;
    for (const b of z.bloques) {
      const abiertos = b.pend.filter(p => ticks[p.id] !== 2).length;
      const carga = b.pend.filter(p => ticks[p.id] !== 2).map(p => EST[p.id]).join(' ');
      const next = b.pend.find(p => ticks[p.id] !== 2);
      const [pc, pt] = ESTADO_PILL[b.estado];
      const [tc, tt] = TRAT_PILL[b.trat];
      h += `<button class="card" data-ficha="${b.id}">
        <h3>${b.titulo}</h3>
        <div class="meta">
          <span class="pill ${pc}">${pt}</span>
          <span class="pill ${tc}">${tt}</span>
          <span class="talle">${b.talle}</span>
        </div>
        <div class="meta">
          <span>${abiertos} pendiente${abiertos === 1 ? '' : 's'}</span>
          <span>·</span><span>carga ${carga || '—'}</span>
          <span>·</span><span>issue #${b.issue}</span>
        </div>
        ${next ? `<div class="next"><b>Próximo:</b> ${strip(next.t)}</div>` : `<div class="next">Todo cerrado ✓</div>`}
      </button>`;
    }
    h += `</div>`;
  }

  h += `<h2 class="sec">Maqueta y deuda transversal</h2>
    <p class="sec-note">Lo que no pertenece a un bloque pero condiciona a todos. Cada ítem es candidato a pendiente en la próxima re-auditoría.</p>`;
  for (const d of DEBT) {
    h += `<div class="ro"><h3>${d.t}</h3>
      <div class="ro-meta"><span class="pill ${d.sev}">${d.sev === 'stop' ? 'crítico' : 'atención'}</span></div>
      <p>${d.d}</p></div>`;
  }

  h += `<h2 class="sec">Historial de actualizaciones</h2>`;
  for (const c of CHANGELOG) {
    h += `<div class="ro"><h3>${c.t}</h3>
      <div class="ro-meta"><span class="pill acc">${c.f}</span></div>
      <p>${c.d}</p></div>`;
  }

  h += `<h2 class="sec">Cómo se usa</h2>
    <p class="sec-note">Abrí la ficha de un bloque → copiá el encargo → corré la sesión → decile a Claude «actualizá el tracker».
    Los ticks son tuyos y viven en este navegador: <b class="pill warn">ámbar</b> = lo marcaste vos, sin verificar ·
    <b class="pill ok">verde</b> = cerrado y verificado en re-auditoría. <b>El tick no es evidencia</b>: la re-auditoría
    re-verifica en código y recién ahí pinta verde. En modo orquestado, el equivalente del ámbar es el PR esperando tu firma.</p>`;
  document.getElementById('p-tablero').innerHTML = h;
}

/* ---------- plan de sesiones ---------- */
function renderPlan() {
  const total = allPend.length;
  const green = allPend.filter(p => ticks[p.id] === 2).length;
  const nextIdx = PLAN.findIndex(s => byId(s.b).pend.some(p => ticks[p.id] !== 2));

  let h = `<h2 class="sec">Plan de sesiones</h2>
    <p class="sec-note">Ordenadas por dependencia: cada una declara sus prerrequisitos ⛓️ y su tratamiento metodológico.
    Estimación en talle S/M/L — mide envergadura relativa, no tiempo.
    <b>${green} de ${total} pendientes cerrados · ${PLAN.length - (nextIdx < 0 ? PLAN.length : nextIdx)} sesiones restantes.</b></p>`;

  h += `<div class="ro" style="border-color:var(--stop)">
    <h3>⛔ 7 de 9 sesiones están bloqueadas por una decisión pendiente</h3>
    <p class="strong">No es un defecto del plan: es el plan diciéndote la verdad sobre dónde falta firma.
    Ninguna decisión se inventa — cada una tiene dueño (Fede) y espera acto explícito.</p></div>`;

  PLAN.forEach((s, i) => {
    const b = byId(s.b);
    const abiertos = b.pend.filter(p => ticks[p.id] !== 2).length;
    const [tc, tt] = TRAT_PILL[s.trat];
    const isNext = i === nextIdx;
    h += `<div class="ro" ${isNext ? 'style="border-color:var(--accent);border-width:2px"' : ''}>
      <h3>${isNext ? '▶ ' : ''}${s.s} · ${s.o}</h3>
      <div class="ro-meta">
        ${isNext ? '<span class="pill acc">próxima ejecutable</span>' : ''}
        <span class="pill ${tc}">${tt}</span>
        <span class="talle">${s.talle}</span>
        <span class="pill idle">${abiertos} abierto${abiertos === 1 ? '' : 's'}</span>
        <a class="pill acc" href="https://github.com/${REPO}/issues/${s.issue}" target="_blank" rel="noopener">issue #${s.issue} ↗</a>
      </div>
      <p><b>⛓️ Prerrequisitos:</b> ${s.pre}</p>
      <div class="btn-row">
        <button class="btn" data-ficha="${s.b}">Abrir ficha</button>
        <button class="btn ghost" data-copy="${s.b}">Copiar encargo</button>
      </div></div>`;
  });
  document.getElementById('p-plan').innerHTML = h;
}

/* ---------- mapa ---------- */
function renderMapa() {
  let h = `<h2 class="sec">El loop de punta a punta</h2>
    <p class="sec-note">Los nodos son los bloques de obra — clickealos para abrir la misma ficha del tablero.
    Las aristas dicen <b>qué dispara cada paso y si es automático o humano</b>: ahí se ve dónde el sistema fluye solo
    y dónde depende de que alguien se acuerde.</p><div class="flow">`;

  const pasos = [
    {b:'b01', edge:'✅ COMPUERTA ABIERTA (2026-07-19) · el install limpio quedó probado; ya no bloquea'},
    {b:'b02', edge:'automático · el registro de cadena queda definido y toda fase posterior está obligada a escribirlo'},
    {b:'b03', edge:'🖐️ HUMANO · batuta devuelve «esto entendí» y FRENA hasta confirmación'},
    {b:'b04', edge:'automático · la RUTA sale con recomendaciones rankeadas y decisiones-a-firmar'},
    {b:'b05', edge:'⛔ COMPUERTA · un externo REQUERIDO no provisto BLOQUEA y pide al humano'},
    {b:'b06', edge:'🖐️ HUMANO · Compuerta Cero: una firma por horizonte, presentada como diff. Sin firma no se delega NADA'},
    {b:'b07', edge:'automático hacia /orquestar · pero cada merge exige firma humana en su PR'},
    {b:'b08', edge:'automático · la re-auditoría se delega a /audit-tracker'},
    {b:'b09', edge:''}
  ];

  pasos.forEach((p, i) => {
    const b = byId(p.b);
    const [pc, pt] = ESTADO_PILL[b.estado];
    h += `<button class="fnode" data-ficha="${b.id}">
      <span class="fn-t">${b.titulo}</span>
      <span class="pill ${pc}">${pt}</span>
    </button>`;
    if (p.edge) h += `<div class="fedge"><span class="trig">${p.edge}</span></div>`;
  });

  h += `</div><h2 class="sec">Dónde el sistema depende de memoria humana</h2>
    <p class="sec-note">Tres puntos del loop no avanzan solos, y es <b>por diseño</b>: la compuerta de precondición,
    la devolución del objetivo en <code>analizar</code>, y la Compuerta Cero. Todo lo demás fluye —
    pero si alguno de esos tres se saltea, el contrato deja de obligar.</p>`;
  document.getElementById('p-mapa').innerHTML = h;
}

/* ---------- stack ---------- */
function renderStack() {
  let h = `<h2 class="sec">Herramientas por capa</h2>
    <p class="sec-note">Qué compone el sistema, qué rol cumple cada pieza y dónde hay deuda.
    <code>batuta</code> es una orquestadora: casi todo su valor está en piezas que <b>no son suyas</b>.</p>`;

  for (const c of STACK) {
    h += `<div class="zone-label">${c.capa}</div><div class="tw"><table>
      <thead><tr><th>Pieza</th><th>Rol</th><th>Conexión</th><th>Estado</th></tr></thead><tbody>`;
    for (const it of c.items) {
      h += `<tr><td><b>${it.n}</b></td><td>${it.rol}</td><td>${it.con}</td>
        <td>${it.warn ? `<span class="pill warn">⚠️</span> ${it.warn}` : '<span class="pill ok">sin deuda</span>'}</td></tr>`;
    }
    h += `</tbody></table></div>`;
  }

  h += `<h2 class="sec">Siete recorridos de un dato punta a punta</h2>
    <p class="sec-note">Si entendés estos siete recorridos, entendés el sistema. Ninguno existe todavía:
    son el contrato de lo que hay que construir.</p>`;
  for (const f of FLOWS) {
    const b = byId(f.b);
    h += `<div class="ro"><h3>${f.t}</h3>
      <div class="ro-meta"><span class="pill idle">${b.titulo}</span></div>
      <p>${f.d}</p></div>`;
  }
  document.getElementById('p-stack').innerHTML = h;
}

/* ---------- decisiones (read-only, sin data-id) ---------- */
let dFilter = 'todas';
function renderDecisiones() {
  const derivadas = DECISION_PENDS
    .map(d => { const f = findPend(d.pendId); return f && ticks[d.pendId] !== 2 ? {...d, f} : null; })
    .filter(Boolean);
  const extras = DECISIONS_EXTRA.filter(d => d.estado === 'pendiente');
  const pendCount = derivadas.length + extras.length;

  let h = `<h2 class="sec">Registro de decisiones</h2>
    <p class="sec-note">El <b>porqué</b> del sistema, no el qué. Solo entra lo estructural: lo que mueve el modelo de datos,
    el alcance o depende de un tercero. <b>${DECISIONS.length} tomadas · ${pendCount} pendientes de firma.</b>
    Las pendientes que ya son un pendiente de obra se derivan en vivo: si se cierran en re-auditoría, desaparecen solas de acá.</p>
    <div class="filters">
      <button class="dchip" data-df="todas" aria-pressed="${dFilter === 'todas'}">Todas</button>
      <button class="dchip" data-df="aceptada" aria-pressed="${dFilter === 'aceptada'}">Aceptadas (${DECISIONS.length})</button>
      <button class="dchip" data-df="pendiente" aria-pressed="${dFilter === 'pendiente'}">Pendientes (${pendCount})</button>
    </div>`;

  if (dFilter !== 'aceptada') {
    h += `<div class="zone-label">⏳ Pendientes de firma — dueño: Fede</div>`;
    for (const d of derivadas) {
      h += `<div class="ro" style="border-color:var(--stop)">
        <h3>${d.n !== '—' ? d.n + ' — ' : ''}${d.t}</h3>
        <div class="ro-meta">
          <span class="pill stop">⏳ pendiente</span>
          <span class="pill idle">desbloquea ${d.f.b.sesion}</span>
          <a class="pill acc" href="https://github.com/${REPO}/issues/${d.f.b.issue}" target="_blank" rel="noopener">issue #${d.f.b.issue} ↗</a>
        </div>
        <p>${d.note}</p></div>`;
    }
    for (const d of extras) {
      h += `<div class="ro" style="border-color:var(--stop)">
        <h3>${d.n} — ${d.t}</h3>
        <div class="ro-meta"><span class="pill stop">⏳ pendiente</span><span class="pill idle">no cuenta para el progreso</span></div>
        <p>${d.ctx}</p><p class="strong">${d.dec}</p></div>`;
    }
  }

  if (dFilter !== 'pendiente') {
    h += `<div class="zone-label">✅ Tomadas</div>`;
    for (const d of DECISIONS) {
      h += `<div class="ro"><h3>${d.n} — ${d.t}</h3>
        <div class="ro-meta"><span class="pill ok">aceptada</span><span class="pill idle">${d.fecha}</span></div>
        <p>${d.ctx}</p>
        <p class="strong"><b>Decisión:</b> ${d.dec}</p>
        <details><summary>Consecuencias y link</summary>
          <p>${d.cons}</p><p><code>${d.link}</code></p></details></div>`;
    }
  }
  document.getElementById('p-decisiones').innerHTML = h;
}

/* ---------- tests (read-only, sin data-id) ---------- */
let tFilter = 'todos';
function renderTests() {
  const rojos = TESTS.flows.filter(f => f.pill === 'rojo').length;
  const deuda = TESTS.contrato.reduce((a, c) => a + (c.total - c.clavados), 0);

  let h = `<h2 class="sec">Mapa de evidencia</h2>
    <p class="sec-note">Herramienta de decisión, no dashboard de cobertura. La altitud es el <b>flujo</b> y el <b>criterio</b>:
    qué recorrido está clavado por un test y qué criterio de cierre quedaría desprotegido mañana.
    <b>${rojos} de ${TESTS.flows.length} recorridos sin test · ${deuda} criterios en deuda de verificación.</b></p>

    <div class="ro" style="border-color:var(--stop)">
      <h3>⚠️ El proyecto entero está en deuda de verificación</h3>
      <p class="strong">Al ser markdown puro no hay tests unitarios posibles (<code>decisiones/006</code>): el único mecanismo
      es la <b>corrida sembrada</b>, un repo de prueba preparado con la condición que se quiere probar.
      Hoy no existe ninguna. Eso hace de <b>S09 una sesión estructural, no un extra</b> —
      hasta que corra, cada criterio «cerrado» puede romperse sin que nadie se entere.</p></div>

    <div class="filters">
      <button class="tchip" data-tf="todos" aria-pressed="${tFilter === 'todos'}">Todo</button>
      <button class="tchip" data-tf="gates" aria-pressed="${tFilter === 'gates'}">Gates</button>
      <button class="tchip" data-tf="flujos" aria-pressed="${tFilter === 'flujos'}">Flujos</button>
      <button class="tchip" data-tf="criterios" aria-pressed="${tFilter === 'criterios'}">Criterios ↔ tests</button>
    </div>`;

  if (tFilter === 'todos' || tFilter === 'gates') {
    h += `<h2 class="sec">Gates reales</h2>
      <p class="sec-note">Snapshot de la última re-auditoría (${LAST_AUDIT}), no estado vivo.</p>
      <div class="tw"><table><thead><tr><th>Gate</th><th>Comando</th><th>Estado</th><th>Nota</th></tr></thead><tbody>`;
    for (const g of TESTS.gates) {
      const pill = g.est === 'rojo' ? '<span class="pill stop">🔴 rojo</span>'
                 : g.est === 'verde' ? '<span class="pill ok">🟢 verde</span>'
                 : '<span class="pill idle">no aplica</span>';
      h += `<tr><td><b>${g.n}</b></td><td><code>${g.cmd}</code></td><td>${pill}</td><td>${g.nota}</td></tr>`;
    }
    h += `</tbody></table></div>`;
  }

  if (tFilter === 'todos' || tFilter === 'flujos') {
    h += `<h2 class="sec">Cobertura a altitud de flujo</h2>
      <p class="sec-note">Los mismos siete recorridos de la pestaña Stack, con su evidencia.</p>`;
    for (const f of TESTS.flows) {
      const fp = f.pill === 'verde' ? '<span class="pill ok">🟢 clavado por test</span>'
               : f.pill === 'ambar' ? '<span class="pill warn">🟠 solo camino feliz</span>'
               : '<span class="pill stop">🔴 sin test</span>';
      h += `<div class="ro"><h3>${f.t}</h3>
        <div class="ro-meta">${fp}</div>
        <p>${f.test}</p></div>`;
    }
  }

  if (tFilter === 'todos' || tFilter === 'criterios') {
    h += `<h2 class="sec">Contrato criterios ↔ tests</h2>
      <p class="sec-note">Criterio sin test que lo proteja = <b>deuda de verificación</b>: puede estar hecho hoy y romperse mañana.</p>
      <div class="tw"><table><thead><tr><th>Bloque</th><th>Criterios</th><th>Clavados</th><th>Deuda</th></tr></thead><tbody>`;
    for (const c of TESTS.contrato) {
      h += `<tr><td><b>${c.bt}</b></td><td>${c.total}</td>
        <td>${c.clavados}</td>
        <td><span class="pill stop">${c.total - c.clavados} sin test</span> ${c.nota}</td></tr>`;
    }
    h += `</tbody></table></div>`;
  }
  document.getElementById('p-tests').innerHTML = h;
}

/* ---------- referencias (read-only, sin data-id) ---------- */
let rFilter = 'todas';
function renderRefs() {
  const falta = REFS.filter(r => r.fresc === 'falta').length;
  let h = `<h2 class="sec">Catálogo de referencias</h2>
    <p class="sec-note">El <b>CÓMO</b> técnico destilado: patrones, tradeoffs, citas y fecha.
    Las fichas solo las <b>linkean</b> — pero además se cargan <b>por trigger</b>: el ejecutor lee toda referencia
    cuyos triggers matcheen su encargo, aunque la ficha no la linkee.
    <b>${REFS.length - falta} generadas · ${falta} faltan</b>, y cada una hay que generarla ANTES del encargo que la necesita.</p>

    <div class="ro" style="border-color:var(--ok)">
      <h3>🟢 S01 saldó 2 de las 5 — quedan ${falta}</h3>
      <p class="strong">El 2026-07-19, el encargo de S01 generó <code>plugins-claude-code.md</code> y
      <code>doc-arquitecto.md</code> antes de tocar nada, como manda el protocolo. La primera trajo el gotcha
      que explica por qué el install no rompe: en <code>git-subdir</code> la url debe ser HTTPS completa.
      <b>Se confirmó en la corrida real</b> (<code>SSH not configured, cloning via HTTPS</code>).</p>
      <p><code>docs/business/</code> no aplica a este proyecto y está declarado así explícitamente:
      <code>batuta</code> es herramienta interna sin mercado ni usuarios externos.</p></div>

    <div class="filters">
      <button class="rchip" data-rf="todas" aria-pressed="${rFilter === 'todas'}">Todas</button>
      <button class="rchip" data-rf="falta" aria-pressed="${rFilter === 'falta'}">🔴 Faltantes (${falta})</button>
      <button class="rchip" data-rf="volatil" aria-pressed="${rFilter === 'volatil'}">Territorio volátil</button>
    </div>`;

  const vis = REFS.filter(r => rFilter === 'todas' || (rFilter === 'falta' && r.fresc === 'falta') || (rFilter === 'volatil' && r.volatil));
  const FRESC = {
    falta:  ['stop', '🔴 faltante'],
    refresco: ['warn', '🟠 pendiente de refresco'],
    fresca: ['ok', '🟢 fresca']
  };
  for (const r of vis) {
    const [fc, ft] = FRESC[r.fresc] || FRESC.falta;
    h += `<div class="ro" style="border-color:var(--${fc === 'ok' ? 'ok' : fc === 'warn' ? 'warn' : 'stop'})">
      <h3>${r.t}</h3>
      <div class="ro-meta">
        <span class="pill ${fc}">${ft}</span>
        ${r.volatil ? '<span class="pill warn">territorio volátil · revalidar cada 3 meses</span>' : ''}
        <span class="pill idle">${r.fecha || 'sin fecha'}</span>
      </div>
      <p>${r.q}</p>
      <p><b>${r.fresc === 'fresca' ? 'Origen:' : 'Generar antes de:'}</b> ${r.antes}</p>
      <p><b>La usan:</b> ${r.usa.join(' · ')}</p>
      <p><b>Triggers:</b> ${r.trig.map(t => `<code>${t}</code>`).join(' ')}</p>
      <p><code>${r.path}</code></p></div>`;
  }
  document.getElementById('p-refs').innerHTML = h;
}

/* ---------- ficha ---------- */
function encargoText(b) {
  const abiertos = b.pend.filter(p => ticks[p.id] !== 2);
  const L = [];
  L.push(`Encargo: ${b.titulo} — proyecto batuta (${REPO})`);
  L.push(`Issue: https://github.com/${REPO}/issues/${b.issue}`);
  L.push(`Tratamiento: ${b.trat === 'sdd' ? 'SDD completo (/sdd-new)' : 'directo'} · Talle ${b.talle}`);
  L.push('');
  L.push('## Planteamiento');
  L.push(strip(b.planteamiento));
  if (b.hallazgo) { L.push(''); L.push('## Hallazgo de la última auditoría'); L.push(strip(b.hallazgo)); }
  if (b.gotcha) { L.push(''); L.push('## Gotcha conocido'); L.push(strip(b.gotcha)); }
  L.push('');
  L.push('## Método');
  b.metodo.forEach((m, i) => L.push(`${i + 1}. ${strip(m)}`));
  if (b.code) { L.push(''); L.push('```'); L.push(b.code); L.push('```'); }
  L.push('');
  L.push('## Criterios de cierre abiertos');
  abiertos.forEach(p => L.push(`- [ ] ${strip(p.t)} (verificación: ${strip(p.v)})`));
  L.push('');
  L.push('## Referencias');
  if (b.refs.length) b.refs.forEach(r => {
    const R = REFS.find(x => x.id === r);
    L.push(`- 🔴 docs/references/${r}.md — FALTA, generar antes de arrancar${R && R.volatil ? ' (territorio volátil)' : ''}`);
  }); else L.push('- (ninguna)');
  L.push('');
  L.push('## Prerrequisitos');
  if (b.prereq.length) b.prereq.forEach(p => L.push(`- ${p}`)); else L.push('- Ninguno');
  L.push('');
  L.push('Reglas: las decisiones de negocio NO se inventan — si una está pendiente, frená y pedila.');
  L.push('Criterio de HECHO: funciona de punta a punta + resiste errores y bordes + verificado.');
  return L.join('\n');
}

function openFicha(id) {
  const b = byId(id);
  if (!b) return;
  const [pc, pt] = ESTADO_PILL[b.estado];
  const [tc, tt] = TRAT_PILL[b.trat];

  let h = `<button class="fx-close" id="fx-x" aria-label="Cerrar">×</button>
    <h3>${b.titulo}</h3>
    <div class="fx-meta">
      <span class="pill ${pc}">${pt}</span>
      <span class="pill ${tc}">${tt}</span>
      <span class="talle">${b.talle}</span>
      <a class="pill acc" href="https://github.com/${REPO}/issues/${b.issue}" target="_blank" rel="noopener">issue #${b.issue} ↗</a>
    </div>
    <h4>🎯 Planteamiento</h4><p>${b.planteamiento}</p>`;

  if (b.hallazgo) h += `<h4>🔍 Hallazgo de la auditoría ${LAST_AUDIT}</h4><p>${b.hallazgo}</p>`;
  h += `<h4>🛠️ Cómo trabajarlo</h4><ol>${b.metodo.map(m => `<li>${m}</li>`).join('')}</ol>`;
  if (b.code) h += `<pre>${esc(b.code)}</pre>`;
  if (b.gotcha) h += `<h4>⚠️ Gotcha conocido</h4><p>${b.gotcha}</p>`;

  h += `<h4>✅ Criterios de cierre</h4><ul class="crit">`;
  for (const p of b.pend) {
    const st = ticks[p.id] || 0;
    h += `<li class="${st === 2 ? 'green' : st === 1 ? 'amber' : ''}">
      <input type="checkbox" id="ck-${p.id}" data-id="${p.id}" ${st ? 'checked' : ''} ${st === 2 ? 'disabled' : ''}>
      <label for="ck-${p.id}">${p.t} <span class="talle">${EST[p.id] || '?'}</span>
        <span class="verif">Verificación: ${p.v}</span></label></li>`;
  }
  h += `</ul>`;

  h += `<h4>📚 Referencias</h4>`;
  if (b.refs.length) {
    h += `<ul>`;
    for (const r of b.refs) {
      const R = REFS.find(x => x.id === r);
      h += `<li>🔴 <code>docs/references/${r}.md</code> — <b>falta, generar antes de arrancar</b>${R && R.volatil ? ' · territorio volátil' : ''}</li>`;
    }
    h += `</ul>`;
  } else h += `<p>Ninguna.</p>`;

  h += `<h4>⛓️ Prerrequisitos</h4>`;
  h += b.prereq.length ? `<ul>${b.prereq.map(p => `<li>${p}</li>`).join('')}</ul>` : `<p>Ninguno.</p>`;

  h += `<div class="btn-row">
    <button class="btn" data-copy="${b.id}">Copiar encargo</button>
    <a class="btn ghost" href="https://github.com/${REPO}/issues/${b.issue}" target="_blank" rel="noopener">Ver issue #${b.issue}</a>
    <button class="btn ghost" id="fx-x2">Cerrar</button>
  </div>`;

  document.getElementById('fx-body').innerHTML = h;
  document.getElementById('fx').showModal();
}

/* ---------- tabs ---------- */
const TABS = [
  {id:'tablero', l:'📋 Tablero', r:renderTablero},
  {id:'plan', l:'🗓️ Plan de sesiones', r:renderPlan},
  {id:'mapa', l:'🗺️ Mapa', r:renderMapa},
  {id:'stack', l:'🔧 Stack', r:renderStack},
  {id:'decisiones', l:'⚖️ Decisiones', r:renderDecisiones},
  {id:'tests', l:'🧪 Tests', r:renderTests},
  {id:'refs', l:'📚 Referencias', r:renderRefs}
];

function showTab(id) {
  const t = TABS.find(x => x.id === id) || TABS[0];
  TABS.forEach(x => {
    document.getElementById('p-' + x.id).classList.toggle('on', x.id === t.id);
    document.getElementById('tb-' + x.id).setAttribute('aria-selected', String(x.id === t.id));
  });
  t.r();
  if (location.hash.slice(1) !== t.id) history.replaceState(null, '', '#' + t.id);
}

document.getElementById('tabs').innerHTML = TABS
  .map(t => `<button role="tab" id="tb-${t.id}" data-tab="${t.id}" aria-selected="false">${t.l}</button>`)
  .join('');

/* ---------- eventos ---------- */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 1800);
}

document.addEventListener('click', ev => {
  const tab = ev.target.closest('[data-tab]');
  if (tab) { showTab(tab.dataset.tab); return; }

  const fic = ev.target.closest('[data-ficha]');
  if (fic) { openFicha(fic.dataset.ficha); return; }

  const cp = ev.target.closest('[data-copy]');
  if (cp) {
    const b = byId(cp.dataset.copy);
    navigator.clipboard.writeText(encargoText(b))
      .then(() => toast('Encargo copiado ✓'))
      .catch(() => toast('No se pudo copiar'));
    return;
  }

  if (ev.target.id === 'fx-x' || ev.target.id === 'fx-x2') {
    document.getElementById('fx').close();
    return;
  }

  const df = ev.target.closest('[data-df]');
  if (df) { dFilter = df.dataset.df; renderDecisiones(); return; }
  const tf = ev.target.closest('[data-tf]');
  if (tf) { tFilter = tf.dataset.tf; renderTests(); return; }
  const rf = ev.target.closest('[data-rf]');
  if (rf) { rFilter = rf.dataset.rf; renderRefs(); return; }
});

document.addEventListener('change', ev => {
  const ck = ev.target.closest('input[data-id]');
  if (!ck) return;
  const id = ck.dataset.id;
  if (ticks[id] === 2) return;              // verde no se toca desde la UI
  if (ck.checked) { ticks[id] = 1; } else { delete ticks[id]; }
  save();
  ck.closest('li').classList.toggle('amber', ck.checked);
  renderStrip();
  toast(ck.checked ? 'Marcado — queda ámbar hasta la re-auditoría' : 'Desmarcado');
});

window.addEventListener('hashchange', () => showTab(location.hash.slice(1)));

renderStrip();
showTab(location.hash.slice(1) || 'tablero');
</script>
